name: Alpine Build Minimal BusyBox Kernel

on:
  workflow_dispatch:

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: alpine:latest

    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            kernel_target: bzImage
            kernel_path: arch/x86/boot/bzImage
            release_name: x86_64

          - arch: arm64
            runner: ubuntu-24.04-arm
            kernel_target: Image
            kernel_path: arch/arm64/boot/Image
            release_name: aarch64

    steps:
      - name: Build
        run: |
          set -e

          echo ">>> Installing dependencies..."
          apk add --no-cache \
            curl bash git github-cli build-base ncurses-dev \
            bison flex bc perl elfutils-dev linux-headers

          # Use GNU Findutils, busybox-find does not support "-printf", https://github.com/torvalds/linux/blob/master/usr/gen_initramfs.sh
          curl -L -o /usr/local/bin/find  https://github.com/mlyxshi/flake/releases/download/${{ matrix.release_name }}/find
          chmod +x /usr/local/bin/find

          echo ">>> Cloning repositories..."
          git clone https://github.com/mirror/busybox /busybox
          git clone --depth=1 https://github.com/torvalds/linux /linux
          git clone --depth=1 https://github.com/mlyxshi/flake /flake

          mkdir /build

          echo ">>> Building BusyBox..."
          cd /busybox
          # https://bugs.busybox.net/show_bug.cgi?id=10296
          git restore --source 0b1c62934215a08351a80977c7cf8e9346683a1e^  -- scripts/kconfig/conf.c
          cp  /flake/dd/busybox/cloud_init_networkcfg.c  miscutils/cloud_init_networkcfg.c
          make allnoconfig KCONFIG_ALLCONFIG=/flake/dd/busybox/busybox.config
          make LDFLAGS=--static -j$(nproc)
          cp busybox /build

          echo ">>> Creating initramfs list..."
          cat > /build/cpio.list <<EOF
          dir /dev 0755 0 0
          nod /dev/console 0600 0 0 c 5 1
          dir /bin 0755 0 0
          file /init /build/init 0755 0 0
          file /bin/busybox /build/busybox 0755 0 0
          EOF

          echo ">>> Building kernel..."
          cd /linux
 
          make ARCH=${{ matrix.arch }} KCONFIG_ALLCONFIG=/flake/dd/busybox/kernel.config allnoconfig
          ./scripts/config --set-str CONFIG_INITRAMFS_SOURCE /build/cpio.list
          make ${{ matrix.kernel_target }} -j$(nproc)

          cp ${{ matrix.kernel_path }} /build/busybox-kernel

          echo ">>> Uploading release..."
          gh release -R mlyxshi/flake upload ${{ matrix.release_name }} /build/busybox-kernel --clobber